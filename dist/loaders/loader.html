<style>
/* Anti-flicker: esconder elementos que o JS modifica */
#produto-react-app .salvar-favoritos,
#produto-react-app .compartilhar-produto,
#produto-react-app .exibe-botao-whatsapp { visibility: hidden; }
.mm-ready #produto-react-app .salvar-favoritos,
.mm-ready #produto-react-app .compartilhar-produto,
.mm-ready #produto-react-app .exibe-botao-whatsapp { visibility: visible; }
/* Esconder WhatsApp original (substituído pelo nosso) */
#popup-msg-whats { display: none !important; }
/* Anti-flicker checkout: esconde Magazord checkout enquanto bundle não carrega */
html.mm-cart-loading #checkout-main-area>*:not(#mm-layout){visibility:hidden!important;opacity:0!important}
html.mm-cart-loading .header-checkout,html.mm-cart-loading .footer-checkout-info,html.mm-cart-loading .horario-atendimento,html.mm-cart-loading #tickerBar,html.mm-cart-loading #footer-react-app,html.mm-cart-loading .ra-footer{display:none!important}
html.mm-cart-loading #checkout-main-area{position:relative;min-height:480px;background:#F2F2F2}
html.mm-cart-loading #checkout-main-area::before{content:"";position:absolute;top:50%;left:50%;width:32px;height:32px;margin:-16px 0 0 -16px;border:3px solid #E5E7EB;border-top-color:#4B664A;border-radius:50%;animation:mm-load-spin 800ms linear infinite}
@keyframes mm-load-spin{to{transform:rotate(360deg)}}
/* Anti-flicker footer global: esconde Magazord footer enquanto bundle injeta o nosso */
html.mm-footer-loading #footer-react-app,html.mm-footer-loading .ra-footer,html.mm-footer-loading .footer-04,html.mm-footer-loading .footer-top,html.mm-footer-loading .footer-middle,html.mm-footer-loading .footer-about,html.mm-footer-loading .footer-bottom,html.mm-footer-loading .footer-checkout-info,html.mm-footer-loading .magazord-logo-container{display:none!important}
/* Anti-flicker HEADER: replica o estado FINAL do bundle (header nativo .ra-header colapsado/invisivel + body padding-top reservado) ANTES do bundle async rodar. Sem isso, o first paint mostra o header/menu ANTIGO do Magazord e o bundle o substitui depois -> flicker + reflow. visibility:hidden (nao display:none) preserva o #cart-preview-area React no DOM (gotcha #5). Removido por header.js apos injetar #mm-header, ou pelo failsafe (timeout 3.5s / s.onerror). NAO cobre /checkout/* (header.js da early-return la). */
html.mm-header-loading header.ra-header{visibility:hidden!important;height:0!important;min-height:0!important;max-height:0!important;padding:0!important;margin:0!important;border:none!important;box-shadow:none!important;overflow:visible!important}
html.mm-header-loading #tickerBar,html.mm-header-loading .ticker-bar{display:none!important}
html.mm-header-loading body{padding-top:var(--mm-header-total,168px)}
@media(max-width:767px){html.mm-header-loading body{padding-top:var(--mm-header-total-mobile,92px)}}
/* DEV mode indicators — 3 estados possíveis:
   .mm-dev-pending  = localStorage setado, ainda carregando (cinza)
   .mm-dev-mode     = bundle local carregou OK (verde — dev real)
   .mm-dev-fallback = bundle local falhou, carregou PROD (laranja — atenção) */
html.mm-dev-pending::before{content:"\231B DEV MODE \2014 carregando localhost\2026";background:#6b7280}
html.mm-dev-mode::before{content:"\26a1 DEV MODE \2014 localhost OK";background:#10b981}
html.mm-dev-fallback::before{content:"\26a0 DEV FALLBACK \2014 localhost offline, usando PROD";background:#f59e0b}
html.mm-dev-pending::before,html.mm-dev-mode::before,html.mm-dev-fallback::before{position:fixed;top:0;left:0;right:0;color:#fff;font:bold 11px/20px monospace;text-align:center;z-index:999999;padding:2px 8px}
html.mm-dev-pending body,html.mm-dev-mode body,html.mm-dev-fallback body{margin-top:20px !important}
</style>
<script>
(function(){var p=location.pathname;if(/^\/checkout\/(?!done)/.test(p)){document.documentElement.classList.add("mm-cart-loading");setTimeout(function(){document.documentElement.classList.remove("mm-cart-loading")},3500)}if(!/^\/checkout\//.test(p)){document.documentElement.classList.add("mm-header-loading");setTimeout(function(){document.documentElement.classList.remove("mm-header-loading")},3500)}document.documentElement.classList.add("mm-footer-loading");setTimeout(function(){document.documentElement.classList.remove("mm-footer-loading")},3500)})();
</script>

<script>
(function(){
  // ===== Madeira Mania CDN loader (multi-CDN com fallback) =====
  // Edita só estas 3 linhas pra trocar versão/host sem rebuild se precisar.
  var VERSION    = 'v2.0.44';
  var REPO       = 'gh/luancamara/madeira-mania-cdn';
  var PAGES_HOST = 'madeira-mania-cdn.luancamara.workers.dev';

  // PRIMÁRIO: Cloudflare Pages (host dedicado, sem rate-limit de mirror).
  //   ?v= força cache-bust por versão (cada deploy bumpa VERSION).
  var PRIMARY  = 'https://' + PAGES_HOST + '/js/madeira-mania.js?v=' + VERSION;
  // FALLBACK: jsDelivr @tag (infra independente) — só se o primário falhar.
  var FALLBACK = 'https://cdn.jsdelivr.net/' + REPO + '@' + VERSION + '/dist/js/madeira-mania.js';

  var devUrl;
  try { devUrl = localStorage.getItem('mm_dev_url'); } catch(e) {}
  var doc = document.documentElement;

  function reveal(){
    // Última rede: revela o Magazord nativo se TODAS as fontes falharem,
    // em vez de deixar o usuário num spinner/tela escondida.
    doc.classList.remove('mm-cart-loading');
    doc.classList.remove('mm-footer-loading');
    doc.classList.remove('mm-header-loading');
  }
  function load(src, onerr){
    var s = document.createElement('script');
    s.src = src; s.async = true;
    if (onerr) s.onerror = onerr;
    document.head.appendChild(s);
    return s;
  }

  if (devUrl) {
    // DEV: tenta localhost; se cair, segue a cadeia PROD (CF Pages → jsDelivr).
    doc.classList.add('mm-dev-pending');
    var sd = load(devUrl);
    sd.onload  = function(){ doc.classList.remove('mm-dev-pending'); doc.classList.add('mm-dev-mode'); console.info('[mm-dev] bundle local OK:', devUrl); };
    sd.onerror = function(){
      doc.classList.remove('mm-dev-pending'); doc.classList.add('mm-dev-fallback');
      console.warn('[mm-dev] localhost offline, usando PROD (CF Pages)');
      load(PRIMARY, function(){ load(FALLBACK, reveal); });
    };
  } else {
    // PROD: CF Pages (primário) → jsDelivr (fallback) → revela nativo.
    load(PRIMARY, function(){
      console.warn('[mm] primário (CF Pages) falhou, tentando fallback jsDelivr');
      load(FALLBACK, function(){ console.warn('[mm] fallback jsDelivr também falhou — revela nativo'); reveal(); });
    });
  }
})();
</script>
