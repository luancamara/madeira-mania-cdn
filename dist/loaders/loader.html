<style>
/* Anti-flicker: esconder elementos que o JS modifica */
#produto-react-app .salvar-favoritos,
#produto-react-app .compartilhar-produto,
#produto-react-app .exibe-botao-whatsapp { visibility: hidden; }
.mm-ready #produto-react-app .salvar-favoritos,
.mm-ready #produto-react-app .compartilhar-produto,
.mm-ready #produto-react-app .exibe-botao-whatsapp { visibility: visible; }
/* Esconder WhatsApp original (substituído pelo nosso) */
#popup-msg-whats { display: none !important; }
/* Anti-flicker checkout: esconde Magazord checkout enquanto bundle não carrega */
html.mm-cart-loading #checkout-main-area>*:not(#mm-layout){visibility:hidden!important;opacity:0!important}
html.mm-cart-loading .header-checkout,html.mm-cart-loading .footer-checkout-info,html.mm-cart-loading .horario-atendimento,html.mm-cart-loading #tickerBar,html.mm-cart-loading #footer-react-app,html.mm-cart-loading .ra-footer{display:none!important}
html.mm-cart-loading #checkout-main-area{position:relative;min-height:480px;background:#F2F2F2}
html.mm-cart-loading #checkout-main-area::before{content:"";position:absolute;top:50%;left:50%;width:32px;height:32px;margin:-16px 0 0 -16px;border:3px solid #E5E7EB;border-top-color:#4B664A;border-radius:50%;animation:mm-load-spin 800ms linear infinite}
@keyframes mm-load-spin{to{transform:rotate(360deg)}}
/* Anti-flicker footer global: esconde Magazord footer enquanto bundle injeta o nosso */
html.mm-footer-loading #footer-react-app,html.mm-footer-loading .ra-footer,html.mm-footer-loading .footer-04,html.mm-footer-loading .footer-top,html.mm-footer-loading .footer-middle,html.mm-footer-loading .footer-about,html.mm-footer-loading .footer-bottom,html.mm-footer-loading .footer-checkout-info,html.mm-footer-loading .magazord-logo-container{display:none!important}
/* DEV mode indicators — 3 estados possíveis:
   .mm-dev-pending  = localStorage setado, ainda carregando (cinza)
   .mm-dev-mode     = bundle local carregou OK (verde — dev real)
   .mm-dev-fallback = bundle local falhou, carregou PROD (laranja — atenção) */
html.mm-dev-pending::before{content:"\231B DEV MODE \2014 carregando localhost\2026";background:#6b7280}
html.mm-dev-mode::before{content:"\26a1 DEV MODE \2014 localhost OK";background:#10b981}
html.mm-dev-fallback::before{content:"\26a0 DEV FALLBACK \2014 localhost offline, usando PROD";background:#f59e0b}
html.mm-dev-pending::before,html.mm-dev-mode::before,html.mm-dev-fallback::before{position:fixed;top:0;left:0;right:0;color:#fff;font:bold 11px/20px monospace;text-align:center;z-index:999999;padding:2px 8px}
html.mm-dev-pending body,html.mm-dev-mode body,html.mm-dev-fallback body{margin-top:20px !important}
</style>
<script>
(function(){var p=location.pathname;if(/^\/checkout\/(?!done)/.test(p)){document.documentElement.classList.add("mm-cart-loading")}document.documentElement.classList.add("mm-footer-loading")})();
</script>

<script>
(function(){
  // ===== Madeira Mania CDN loader =====
  // Pra trocar a versão servida sem rebuild, edita só a linha abaixo.
  // Aceita semver range (@^2), tag exata (@v2.1.3), ou branch (@main).
  var VERSION = 'v2.0.5';
  var REPO    = 'gh/luancamara/madeira-mania-cdn';

  var PROD = 'https://cdn.jsdelivr.net/' + REPO + '@' + VERSION + '/dist/js/madeira-mania.js';
  var devUrl;
  try { devUrl = localStorage.getItem('mm_dev_url'); } catch(e) {}
  var doc = document.documentElement;
  var s = document.createElement('script');
  s.src = devUrl || PROD;
  s.async = true;

  if (devUrl) {
    // Estado 1: tentativa inicial — pending (cinza) até sabermos se deu certo
    doc.classList.add('mm-dev-pending');

    s.onload = function(){
      // Estado 2: bundle local carregou OK — dev real (verde)
      doc.classList.remove('mm-dev-pending');
      doc.classList.add('mm-dev-mode');
      console.info('[mm-dev] bundle local OK:', devUrl);
    };

    s.onerror = function(){
      // Estado 3: bundle local falhou — fallback PROD (laranja)
      doc.classList.remove('mm-dev-pending');
      doc.classList.add('mm-dev-fallback');
      console.warn('[mm-dev] localhost offline, usando PROD:', PROD);
      var f = document.createElement('script');
      f.src = PROD; f.async = true;
      document.head.appendChild(f);
    };
  }

  document.head.appendChild(s);
})();
</script>
